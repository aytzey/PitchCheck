name: Feature request
description: Suggest a product, model, runtime, or UX improvement.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should PitchCheck do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Desktop runtime
        - label: Vast.ai deployment
        - label: Scoring model
        - label: UI/UX
        - label: Installer/update flow
