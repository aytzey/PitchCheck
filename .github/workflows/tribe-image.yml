name: Tribe Service Image

on:
  push:
    branches: [main]
    paths:
      - "tribe_service/**"
      - "docker-compose.yml"
      - ".github/workflows/tribe-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: tribe_service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pitchcheck-tribe:latest
            ghcr.io/${{ github.repository_owner }}/pitchcheck-tribe:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
