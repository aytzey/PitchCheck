name: pitchcheck

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pitchcheck_web
    environment:
      NODE_ENV: production
      PORT: 3000
      TRIBE_SERVICE_URL: http://tribe-service:8090
    depends_on:
      tribe-service:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - pitchcheck_net

  tribe-service:
    build:
      context: .
      dockerfile: tribe_service/Dockerfile
    container_name: pitchcheck_tribe
    environment:
      TRIBE_MODEL_ID: ${TRIBE_MODEL_ID:-facebook/tribev2}
      TRIBE_DEVICE: ${TRIBE_DEVICE:-cuda}
      TRIBE_CACHE_DIR: /models
      TRIBE_ALLOW_MOCK: ${TRIBE_ALLOW_MOCK:-0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4.1-mini}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-20}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      XDG_CACHE_HOME: /models/.cache
      TRIBE_TEXT_MODEL: ${TRIBE_TEXT_MODEL:-NousResearch/Hermes-3-Llama-3.2-3B}
    volumes:
      - tribe_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    expose:
      - "8090"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - pitchcheck_net

volumes:
  tribe_models:

networks:
  pitchcheck_net:
    name: pitchcheck_internal
    driver: bridge
